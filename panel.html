<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZX Royal Elite Ultra Dashboard</title>
    <style>
        :root { 
            --primary: #00ffcc; 
            --secondary: #0099ff; 
            --dark-bg: #060913; 
            --card-bg: #0e1527; 
            --text: #f3f4f6; 
            --purple: #a855f7;
            --danger: #ef4444;
        }
        body { 
            background: var(--dark-bg); 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            text-align: right; 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .box { 
            width: 100%; 
            max-width: 550px; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid #1f2937;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.05);
        }
        h3 { color: var(--primary); margin-top: 0; font-size: 20px; text-shadow: 0 0 15px rgba(0, 255, 204, 0.4); text-align: center; }
        
        .status-badge { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(239, 68, 68, 0.1); 
            border: 1px solid var(--danger); 
            padding: 8px 15px; 
            border-radius: 12px; 
            font-size: 13px; 
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .status-badge.connected {
            background: rgba(0, 255, 204, 0.1);
            border-color: var(--primary);
        }

        .input-group { margin-bottom: 18px; text-align: right; }
        label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 6px; font-weight: 600; padding-right: 5px; }
        input { width: 100%; padding: 12px 15px; background: #080d1a; border: 1px solid #1f2937; border-radius: 12px; color: #fff; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 12px rgba(0, 255, 204, 0.2); }
        
        .btn-main { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; display: block; text-align: center; }
        .btn-main.btn-blue { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #060913; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }
        .btn-main.btn-blue:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0, 255, 204, 0.5); }
        .btn-main.btn-red { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: var(--danger); }
        .btn-main.btn-red:hover { background: var(--danger); color: #fff; transform: translateY(-2px); box-shadow: 0 0 15px var(--danger); }

        .section-title { 
            text-align: right; 
            font-size: 14px; 
            color: var(--secondary); 
            margin: 25px 0 12px 0; 
            border-bottom: 1px solid #1f2937; 
            padding-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .btn-action { 
            background: #111b33; 
            color: #9ca3af; 
            padding: 14px; 
            font-size: 13px; 
            font-weight: 600; 
            border-radius: 12px; 
            border: 1px solid #1f2937; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px;
        }
        .btn-action:hover { border-color: var(--primary); color: #fff; transform: translateY(-2px); }
        
        .btn-action.active-neon {
            background: rgba(0, 255, 204, 0.08) !important;
            border-color: var(--primary) !important;
            color: var(--primary) !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
        }
        .btn-action.btn-premium.active-neon {
            background: rgba(168, 85, 247, 0.08) !important;
            border-color: var(--purple) !important;
            color: var(--purple) !important;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
            text-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
        }

        .btn-premium { border-color: rgba(168, 85, 247, 0.3); color: #c084fc; }
        .btn-premium:hover { border-color: var(--purple); }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .metric-card { background: #080d1a; border: 1px solid #1f2937; padding: 10px; border-radius: 12px; text-align: center; }
        .metric-value { font-size: 15px; font-weight: bold; color: var(--primary); transition: all 0.5s ease; }
        .metric-label { font-size: 11px; color: #6b7280; margin-top: 3px; }
        
        .progress-bar-container { width: 100%; height: 3px; background: #111b33; border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; width: 20%; background: var(--primary); transition: width 0.5s ease, background 0.5s ease; }

        .ai-container { background: #080d1a; border: 1px solid var(--purple); border-radius: 16px; padding: 15px; margin-top: 25px; }
        .ai-title { font-size: 14px; color: var(--purple); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .ai-chat-box, .chat-box { height: 120px; border-radius: 12px; border: 1px solid #1f2937; margin-bottom: 10px; padding: 12px; overflow-y: auto; font-size: 13px; background: #0d111a; }
        .chat-input-row { display: flex; gap: 10px; margin-top: 12px; }
        .chat-input { flex: 1; }
        .btn-send { width: auto; padding: 0 25px; margin: 0; background: #1f2937; color: var(--primary); border: 1px solid #1f2937; border-radius: 12px; cursor: pointer; font-size: 13px; }
        .btn-send:hover { background: var(--primary); color: #060913; }

        .log-container { background: #04070f; border: 1px solid #111827; border-radius: 12px; padding: 12px; font-family: 'Courier New', monospace; font-size: 11px; color: #10b981; height: 100px; overflow-y: auto; margin-top: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .log-entry { margin-bottom: 4px; line-height: 1.4; }
        .log-time { color: #6b7280; margin-left: 6px; }

        #toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #0d111a; border-left: 4px solid var(--primary); border-right: 1px solid #1f2937; border-top: 1px solid #1f2937; border-bottom: 1px solid #1f2937; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideIn { from { transform: translateX(-120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="box">
        <h3>زد إكس رويال لوحة النخبة V2</h3>
        
        <div class="status-badge" id="botStatusBadge">
            <span>حالة البوت الحالية:</span>
            <strong id="statusText">منفصل عن الهوست 🛑</strong>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-value" id="val-cpu">14%</div>
                <div class="metric-label">استهلاك الـ CPU</div>
                <div class="progress-bar-container"><div class="progress-fill" id="bar-cpu" style="width: 14%;"></div></div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="val-ram">242 MB</div>
                <div class="metric-label">ذاكرة الـ RAM</div>
                <div class="progress-bar-container"><div class="progress-fill" id="bar-ram" style="width: 24%;"></div></div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="val-ping">24ms</div>
                <div class="metric-label">سرعة البنك Ping</div>
                <div class="progress-bar-container"><div class="progress-fill" id="bar-ping" style="width: 24%; background: var(--secondary);"></div></div>
            </div>
        </div>

        <div class="input-group">
            <label>عنوان خادم الماينكرافت (Server IP)</label>
            <input type="text" id="srvIp" value="zxroyal.falixsrv.me" placeholder="play.zxroyal.net">
        </div>
        <div class="input-group">
            <label>منفذ الاتصال (Port)</label>
            <input type="text" id="srvPort" value="25565">
        </div>
        <div class="input-group">
            <label>اسم الحساب المستعار (Label)</label>
            <input type="text" id="botName" value="zx_royal">
        </div>

        <button class="btn-main btn-blue" onclick="connectBot()">⚡ إطلاق البوت الفوري أونلاين</button>
        <button class="btn-main btn-red" onclick="disconnectBot()">❌ إخراج البوت وسحب الواجهة</button>

        <div class="section-title">
            <span>تحركات حية وأنظمة أوتوماتيكية</span>
            <span id="activeCounter" style="font-size: 11px; color: var(--primary); background: rgba(0,255,204,0.1); padding: 1px 7px; border-radius: 8px;">الميزات النشطة: 0 من 6</span>
        </div>
        
        <div class="grid">
            <button class="btn-action" onclick="toggleFeature(this, 'flee', 'الحظر الذكي', 'تم تشغيل ميزة الفلو لمنع الطرد')">
