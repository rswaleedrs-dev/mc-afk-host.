<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZX Royal Elite Ultra Dashboard</title>
    <style>
        :root { 
            --primary: #00ffcc; 
            --secondary: #0099ff; 
            --dark-bg: #060913; 
            --card-bg: #0e1527; 
            --text: #f3f4f6; 
            --purple: #a855f7;
            --danger: #ef4444;
        }
        body { 
            background: var(--dark-bg); 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            text-align: right; 
            margin: 0; 
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .box { 
            width: 100%; 
            max-width: 500px; 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid #1f2937;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        h3 { color: var(--primary); margin: 5px 0; font-size: 18px; text-shadow: 0 0 15px rgba(0, 255, 204, 0.4); text-align: center; }
        
        .status-badge { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(239, 68, 68, 0.1); 
            border: 1px solid var(--danger); 
            padding: 8px 12px; 
            border-radius: 12px; 
            font-size: 12px;
        }
        .status-badge.connected {
            background: rgba(0, 255, 204, 0.1);
            border-color: var(--primary);
        }

        .input-group { text-align: right; display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 11px; color: #9ca3af; font-weight: 600; padding-right: 5px; }
        input { width: 100%; padding: 8px 12px; background: #080d1a; border: 1px solid #1f2937; border-radius: 10px; color: #fff; box-sizing: border-box; font-size: 13px; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn-main { width: 100%; padding: 10px; border: none; border-radius: 10px; font-weight: bold; font-size: 13px; cursor: pointer; text-align: center; box-sizing: border-box; }
        .btn-main.btn-blue { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #060913; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }
        .btn-main.btn-red { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: var(--danger); }

        .section-title { 
            font-size: 13px; 
            color: var(--secondary); 
            border-bottom: 1px solid #1f2937; 
            padding-bottom: 4px; 
            margin-top: 10px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; box-sizing: border-box; }
        
        .btn-action { 
            background: #111b33; 
            color: #9ca3af; 
            padding: 10px; 
            font-size: 11px; 
            font-weight: 600; 
            border-radius: 10px; 
            border: 1px solid #1f2937; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 2px;
            box-sizing: border-box;
        }
        
        .btn-action.active-neon {
            background: rgba(0, 255, 204, 0.15) !important;
            border-color: var(--primary) !important;
            color: var(--primary) !important;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .btn-action.btn-premium.active-neon {
            background: rgba(168, 85, 247, 0.15) !important;
            border-color: var(--purple) !important;
            color: var(--purple) !important;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        .btn-premium { border-color: rgba(168, 85, 247, 0.3); color: #c084fc; }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .metric-card { background: #080d1a; border: 1px solid #1f2937; padding: 6px; border-radius: 10px; text-align: center; }
        .metric-value { font-size: 12px; font-weight: bold; color: var(--primary); }
        .metric-label { font-size: 9px; color: #6b7280; }
        
        .progress-bar-container { width: 100%; height: 3px; background: #111b33; border-radius: 2px; margin-top: 3px; overflow: hidden; }
        .progress-fill { height: 100%; width: 20%; background: var(--primary); transition: width 0.5s ease; }

        .ai-container { background: #080d1a; border: 1px solid var(--purple); border-radius: 12px; padding: 10px; box-sizing: border-box; }
        .ai-title { font-size: 12px; color: var(--purple); font-weight: bold; margin-bottom: 6px; }
        .ai-chat-box, .chat-box { height: 90px; border-radius: 10px; border: 1px solid #1f2937; padding: 8px; overflow-y: auto; font-size: 11px; background: #0d111a; box-sizing: border-box; }
        .chat-input-row { display: flex; gap: 6px; }
        .btn-send { width: auto; padding: 0 12px; background: #1f2937; color: var(--primary); border: 1px solid #1f2937; border-radius: 10px; cursor: pointer; font-size: 11px; }

        .log-container { background: #04070f; border: 1px solid #111827; border-radius: 10px; padding: 8px; font-family: 'Courier New', monospace; font-size: 9px; color: #10b981; height: 80px; overflow-y: auto; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); box-sizing: border-box; }
        .log-entry { margin-bottom: 2px; }
        .log-time { color: #6b7280; margin-left: 4px; }

        #toast-container { position: fixed; bottom: 15px; left: 15px; z-index: 10000; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: #0d111a; border-left: 4px solid var(--primary); color: #fff; padding: 10px 15px; border-radius: 8px; font-size: 11px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateX(-120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="box">
        <h3>زد إكس رويال لوحة النخبة V2</h3>
        
        <div class="status-badge" id="botStatusBadge">
            <span>حالة البوت الحالية:</span>
            <strong id="statusText">منفصل عن الهوست 🛑</strong>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-value" id="val-cpu">14%</div>
                <div class="metric-label">استهلاك الـ CPU</div>
                <div class="progress-bar-container"><div class="progress-fill" id="bar-cpu" style="width: 14%;"></div></div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="val-ram">242 MB</div>
                <div class="metric-label">ذاكرة الـ RAM</div>
                <div class="progress-bar-container"><div class="progress-fill" id="bar-ram" style="width: 24%;"></div></div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="val-ping">24ms</div>
                <div class="metric-label">سرعة البنك Ping</div>
                <div class="progress-bar-container"><div class="progress-fill" id="bar-ping" style="width: 24%; background: var(--secondary);"></div></div>
            </div>
        </div>

        <div class="input-group">
            <label>عنوان خادم الماينكرافت (Server IP)</label>
            <input type="text" id="srvIp" value="zxroyal.falixsrv.me">
        </div>
        <div class="input-group">
            <label>منفذ الاتصال (Port)</label>
            <input type="text" id="srvPort" value="25565">
        </div>
        <div class="input-group">
            <label>اسم الحساب المستعار (Label)</label>
            <input type="text" id="botName" value="zx_royal">
        </div>

        <button class="btn-main btn-blue" onclick="connectBot()">⚡ إطلاق البوت الفوري أونلاين</button>
        <button class="btn-main btn-red" onclick="disconnectBot()">❌ إخراج البوت وسحب الواجهة</button>

        <div class="section-title">
            <span>تحركات حية وأنظمة أوتوماتيكية</span>
            <span id="activeCounter" style="font-size: 10px; color: var(--primary); background: rgba(0,255,204,0.1); padding: 1px 6px; border-radius: 6px;">الميزات النشطة: 0 من 6</span>
        </div>
        
        <div class="grid">
            <button class="btn-action" onclick="toggleFeature(this, 'flee', 'الحظر الذكي', 'تم تشغيل ميزة الفلو لمنع الطرد')">
                <span>حظر ذكي</span><span class="badge-status" style="color:#ef4444;">[معطّل 🔴]</span>
            </button>
            <button class="btn-action" onclick="toggleFeature(this, 'attack', 'الهجوم التلقائي', 'تم بدء الهجوم التلقائي والدفاع عن النفس')">
                <span>هجوم تلقائي</span><span class="badge-status" style="color:#ef4444;">[معطّل 🔴]</span>
            </button>
            <button class="btn-action" onclick="toggleFeature(this, 'sneak', 'التسلل والالتفاف', 'تم تفعيل نمط التسلل والمشي الدائري الذكي')">
                <span>تسلل وحركة 3</span><span class="badge-status" style="color:#ef4444;">[معطّل 🔴]</span>
            </button>
            <button class="btn-action btn-premium" onclick="toggleFeature(this, 'fly', 'الطيران المستمر', 'تم تفعيل الطيران التلقائي ومضاد السقوط من الارتفاعات')">
                <span>طيران تلقائي</span><span class="badge-status" style="color:#ef4444;">[معطّل 🔴]</span>
            </button>
